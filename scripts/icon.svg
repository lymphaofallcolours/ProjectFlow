<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1021"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle glow layer -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Graph nodes — 3 connected nodes forming a flow -->
  <!-- Node 1 — top left (circle/event) -->
  <circle cx="160" cy="176" r="44" fill="#1e293b" stroke="#60a5fa" stroke-width="2.5" opacity="0.9"/>
  <circle cx="160" cy="176" r="44" fill="#60a5fa" opacity="0.08"/>

  <!-- Node 2 — center (square/narration) -->
  <rect x="214" y="224" width="84" height="64" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5" opacity="0.9"/>
  <rect x="214" y="224" width="84" height="64" rx="10" fill="#a78bfa" opacity="0.08"/>

  <!-- Node 3 — bottom right (diamond/social) -->
  <g transform="translate(352,336)">
    <path d="M0,-44 L44,0 L0,44 L-44,0Z" fill="#1e293b" stroke="#f472b6" stroke-width="2.5" opacity="0.9"/>
    <path d="M0,-44 L44,0 L0,44 L-44,0Z" fill="#f472b6" opacity="0.08"/>
  </g>

  <!-- Edges — connecting lines -->
  <line x1="200" y1="196" x2="224" y2="234" stroke="#475569" stroke-width="2" opacity="0.6"/>
  <line x1="288" y1="276" x2="322" y2="310" stroke="#475569" stroke-width="2" opacity="0.6"/>

  <!-- Edge arrow heads -->
  <polygon points="224,234 218,224 228,226" fill="#475569" opacity="0.6"/>
  <polygon points="322,310 316,300 326,302" fill="#475569" opacity="0.6"/>

  <!-- Glow effects on nodes -->
  <circle cx="160" cy="176" r="50" fill="#60a5fa" opacity="0.06" filter="url(#blur)"/>
  <rect x="210" y="220" width="92" height="72" rx="14" fill="#a78bfa" opacity="0.06" filter="url(#blur)"/>

  <!-- PF monogram -->
  <text x="256" y="460" font-family="system-ui, sans-serif" font-size="36" font-weight="700"
    fill="#94a3b8" opacity="0.6" text-anchor="middle" letter-spacing="6">
    PROJECTFLOW
  </text>
</svg>
